services:
  db:
    image: postgres:16-alpine
    container_name: vatlieu_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: vatlieu
      POSTGRES_PASSWORD: vatlieu123
      POSTGRES_DB: vatlieu
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vatlieu -d vatlieu"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: vatlieu_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
